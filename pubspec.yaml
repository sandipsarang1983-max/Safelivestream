name: safe_live_stream_app
description: SafeStream AI - Global Live Moderation with ML Vision for 2026.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Updated Firebase packages to resolve the Pigeon crash
  firebase_core: ^3.9.0
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.12
  google_sign_in: ^6.2.1

  # ML Kit and other dependencies
  google_mlkit_object_detection: ^0.12.0
  google_mlkit_commons: ^0.7.0
  google_mlkit_language_id: ^0.12.0

  camera: ^0.10.5
  image_picker: ^1.0.4
  http: ^1.1.0
  dio: ^5.3.0
  flutter_material_color_picker: ^1.2.0
  intl: ^0.19.0
  crypto: ^3.0.3
  encrypt: ^5.0.3
  in_app_purchase: ^3.2.0
  in_app_purchase_android: ^0.3.6
  in_app_purchase_storekit: ^0.3.14
  cupertino_icons: ^1.0.2
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0 # Updated to latest stable

flutter:
  uses-material-design: true
  assets:
    - assets/global_moderation_config.json
    - assets/vision_trigger_list.json
