name: safe_live_stream_app
description: SafeStream AI - Global Live Moderation with ML Vision for 2026.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.14.0
  cloud_firestore: ^4.14.0

  # ML Kit for Vision & Object Detection
  google_mlkit_object_detection: ^0.11.0
  google_mlkit_commons: ^0.11.0
  # FIXED: Added missing language identification package used in global_moderator.dart
  google_mlkit_language_id: ^0.7.0

  # Camera & Media
  camera: ^0.10.5
  image_picker: ^1.0.4

  # Networking
  http: ^1.1.0
  dio: ^5.3.0

  # UI & Material
  flutter_material_color_picker: ^1.2.0
  intl: ^0.19.0

  # Encryption
  crypto: ^3.0.3
  encrypt: ^5.0.3

  # In-App Purchases
  # FIXED: Added missing billing packages used in iap_service.dart
  in_app_purchase: ^3.2.0
  in_app_purchase_android: ^0.3.6
  in_app_purchase_storekit: ^0.3.14

  # Other
  cupertino_icons: ^1.0.2
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/global_moderation_config.json
    - assets/vision_trigger_list.json

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
  crypto: ^3.0.3
  encrypt: ^5.0.3

  # Other
  cupertino_icons: ^1.0.2
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/global_moderation_config.json
    - assets/vision_trigger_list.json

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
