name: safe_livestream
description: "A secure live streaming application."
publish_to: 'none' # Prevent accidental publishing

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  # Flutter core
  flutter:
    sdk: flutter
  
  # Firebase Core (Must be first)
  firebase_core: ^4.9.0
  
  # Firebase Services (Compatible 6.x versions)
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  
  # State Management & Networking
  flutter_riverpod: ^2.6.0
  http: ^1.2.2
  
  # Data Handling
  json_annotation: ^4.9.0
  
  # Icons & UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  # Testing
  flutter_test:
    sdk: flutter
  
  # Linting & Code Generation
  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
