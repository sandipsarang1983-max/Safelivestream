name: safe_livestream
description: "A secure live streaming application."
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Using latest stable versions as of May 2026
  firebase_core: ^3.12.0
  firebase_auth: ^5.14.0
  cloud_firestore: ^5.5.0
  http: ^1.2.2
  flutter_riverpod: ^2.6.0 # Recommended for state management
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
