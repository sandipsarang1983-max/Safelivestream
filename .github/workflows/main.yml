name: Build Mobile Apps

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apps:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Force Overwrite Clean Pubspec
        run: |
          cat << 'EOF' > pubspec.yaml
          name: safe_live_stream_app
          description: SafeStream AI - Global Live Moderation with ML Vision for 2026.
          publish_to: 'none'
          version: 1.0.0+1

          environment:
            sdk: '>=3.0.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            firebase_core: ^2.24.0
            firebase_auth: ^4.14.0
            cloud_firestore: ^4.14.0
            
            # FIXED: Upgraded ML Kit suite to modern 0.12.0 ecosystem milestone
            google_mlkit_object_detection: ^0.12.0
            google_mlkit_commons: ^0.7.1
            google_mlkit_language_id: ^0.12.0
            
            camera: ^0.10.5
            image_picker: ^1.0.4
            http: ^1.1.0
            dio: ^5.3.0
            flutter_material_color_picker: ^1.2.0
            intl: ^0.19.0
            crypto: ^3.0.3
            encrypt: ^5.0.3
            in_app_purchase: ^3.2.0
            in_app_purchase_android: ^0.3.6
            in_app_purchase_storekit: ^0.3.14
            cupertino_icons: ^1.0.2
            uuid: ^4.0.0

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0

          flutter:
            uses-material-design: true
            assets:
              - assets/global_moderation_config.json
              - assets/vision_trigger_list.json
            fonts:
              - family: Roboto
                fonts:
                  - asset: assets/fonts/Roboto-Regular.ttf
                  - asset: assets/fonts/Roboto-Bold.ttf
                    weight: 700
          EOF

      - name: Set up Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.x' 
          architecture: x64
      
      - name: Fetch Core Dependencies
        run: flutter pub get

      # --- ANDROID BUILD STAGE ---
      - name: Regenerate Android Tooling
        run: |
          rm -rf android
          flutter create . --platforms=android --project-name=safe_live_stream_app
      
      - name: Compile Release APK
        run: flutter build apk --release
      
      - name: Publish Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SafeLive-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      # --- IOS BUILD STAGE ---
      - name: Compile iOS Binaries
        run: flutter build ios --release --no-codesign
      
      - name: Construct Final IPA Bundle
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          mv Runner.app Payload/Runner.app
          zip -r Runner.ipa Payload/
      
      - name: Publish iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SafeLive-IPA
          path: build/ios/iphoneos/Runner.ipa
