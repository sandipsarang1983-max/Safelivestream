name: Build APK & IPA

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      # FIX: This dynamically rewrites a 100% clean pubspec.yaml file on the runner to wipe out the duplicate lines
      - name: Force Overwrite Clean Pubspec
        run: |
          cat << 'EOF' > pubspec.yaml
          name: safe_live_stream_app
          description: SafeStream AI - Global Live Moderation with ML Vision for 2026.
          publish_to: 'none'
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            firebase_core: ^2.24.0
            firebase_auth: ^4.14.0
            cloud_firestore: ^4.14.0
            google_mlkit_object_detection: ^0.11.0
            google_mlkit_commons: ^0.11.0
            google_mlkit_language_id: ^0.7.0
            camera: ^0.10.5
            image_picker: ^1.0.4
            http: ^1.1.0
            dio: ^5.3.0
            flutter_material_color_picker: ^1.2.0
            intl: ^0.19.0
            crypto: ^3.0.3
            encrypt: ^5.0.3
            in_app_purchase: ^3.2.0
            in_app_purchase_android: ^0.3.6
            in_app_purchase_storekit: ^0.3.14
            cupertino_icons: ^1.0.2
            uuid: ^4.0.0
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0
          flutter:
            uses-material-design: true
            assets:
              - assets/global_moderation_config.json
              - assets/vision_trigger_list.json
            fonts:
              - family: Roboto
                fonts:
                  - asset: assets/fonts/Roboto-Regular.ttf
                  - asset: assets/fonts/Roboto-Bold.ttf
                    weight: 700
          EOF
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.x' 
          architecture: x64
      
      - name: Get dependencies
        run: flutter pub get

      - name: Recreate Android Project Configuration
        run: |
          rm -rf android
          flutter create . --platforms=android --project-name=safe_live_stream_app
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SafeLive-APK
          path: build/app/outputs/flutter-apk/app-release.apk

  build-ipa:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4

      # Apply the same clean pubspec overwrite to the iOS builder job
      - name: Force Overwrite Clean Pubspec
        run: |
          cat << 'EOF' > pubspec.yaml
          name: safe_live_stream_app
          description: SafeStream AI - Global Live Moderation with ML Vision for 2026.
          publish_to: 'none'
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            firebase_core: ^2.24.0
            firebase_auth: ^4.14.0
            cloud_firestore: ^4.14.0
            google_mlkit_object_detection: ^0.11.0
            google_mlkit_commons: ^0.11.0
            google_mlkit_language_id: ^0.7.0
            camera: ^0.10.5
            image_picker: ^1.0.4
            http: ^1.1.0
            dio: ^5.3.0
            flutter_material_color_picker: ^1.2.0
            intl: ^0.19.0
            crypto: ^3.0.3
            encrypt: ^5.0.3
            in_app_purchase: ^3.2.0
            in_app_purchase_android: ^0.3.6
            in_app_purchase_storekit: ^0.3.14
            cupertino_icons: ^1.0.2
            uuid: ^4.0.0
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0
          flutter:
            uses-material-design: true
            assets:
              - assets/global_moderation_config.json
              - assets/vision_trigger_list.json
            fonts:
              - family: Roboto
                fonts:
                  - asset: assets/fonts/Roboto-Regular.ttf
                  - asset: assets/fonts/Roboto-Bold.ttf
                    weight: 700
          EOF
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.x' 
          architecture: x64
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build iOS
        run: flutter build ios --release --no-codesign
      
      - name: Create IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          mv Runner.app Payload/Runner.app
          zip -r Runner.ipa Payload/
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SafeLive-IPA
          path: build/ios/iphoneos/Runner.ipa
