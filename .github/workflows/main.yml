name: Build Mobile Apps

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.44.0'
      
      - name: Install Dependencies
        run: flutter pub get
      
      - name: Fix Gradle Permissions
        run: chmod +x android/gradlew

      # Standard way to ensure the wrapper is set up correctly
      - name: Validate Gradle Wrapper
        run: |
          cd android
          ./gradlew --version
          cd ..

      # Build APK using release mode for a proper test
      # Using --release to verify signing configs and minification
      - name: Build APK
        run: flutter build apk --release --split-per-abi
        env:
          # This helps avoid OOM errors on smaller runners
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m"
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SafeLive-APK
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7
