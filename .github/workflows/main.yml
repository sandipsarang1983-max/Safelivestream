          echo "  google_mlkit_object_detection: ^0.11.0" >> pubspec.yaml
          echo "  google_mlkit_commons: ^0.6.1" >> pubspec.yaml
          # FIXED: Changed from ^0.6.1 to ^0.6.0 to match the official repository version tracking
          echo "  google_mlkit_language_id: ^0.6.0" >> pubspec.yaml
