name: Build APK & IPA

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # FIXED: Uses clean base64 to restore a perfect pubspec.yaml with zero syntax error risk
      - name: Force Overwrite Clean Pubspec
        run: |
          echo "" | base64 -d > pubspec.yaml

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.x' 
          architecture: x64
      
      - name: Get dependencies
        run: flutter pub get

      - name: Recreate Android Project Configuration
        run: |
          rm -rf android
          flutter create . --platforms=android --project-name=safe_live_stream_app
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SafeLive-APK
          path: build/app/outputs/flutter-apk/app-release.apk

  build-ipa:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # FIXED: Same base64 bypass deployed here
      - name: Force Overwrite Clean Pubspec
        run: |
          echo "" | base64 -d > pubspec.yaml
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.x' 
          architecture: x64
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build iOS
        run: flutter build ios --release --no-codesign
      
      - name: Create IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          mv Runner.app Payload/Runner.app
          zip -r Runner.ipa Payload/
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SafeLive-IPA
          path: build/ios/iphoneos/Runner.ipa
