name: Build Mobile Apps

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apps:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Force Overwrite Clean Pubspec
        run: |
          echo "" | base64 -d > pubspec.yaml

      - name: Set up Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.x' 
          architecture: x64
      
      - name: Fetch Core Dependencies
        run: flutter pub get

      # --- ANDROID BUILD STAGE ---
      - name: Regenerate Android Tooling
        run: |
          rm -rf android
          flutter create . --platforms=android --project-name=safe_live_stream_app
      
      - name: Compile Release APK
        run: flutter build apk --release
      
      - name: Publish Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SafeLive-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      # --- IOS BUILD STAGE ---
      - name: Compile iOS Binaries
        run: flutter build ios --release --no-codesign
      
      - name: Construct Final IPA Bundle
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          mv Runner.app Payload/Runner.app
          zip -r Runner.ipa Payload/
      
      - name: Publish iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SafeLive-IPA
          path: build/ios/iphoneos/Runner.ipa
