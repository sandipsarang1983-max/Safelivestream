plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services" // Required for Firebase
}

android {
    namespace "com.example.safe_live_stream_app"
    compileSdk 35 // Targeting Android 15 (API 35)

    defaultConfig {
        applicationId "com.example.safe_live_stream_app"
        minSdk 21
        targetSdk 35 // Must match compileSdk for 2026 Play Store compliance
        versionCode 1
        versionName "1.0.0"
    }

    // FIX: Positioned signingConfigs safely ABOVE buildTypes to avoid evaluation sequence errors
    signingConfigs {
        release {
            storeFile file('upload-keystore.jks')
            storePassword System.getenv("KEYSTORE_PASSWORD")
            keyAlias System.getenv("KEY_ALIAS")
            keyPassword System.getenv("KEY_PASSWORD")
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    // FIX: Explicit Java 17 compatibility mapping required by AGP 8.5+ and Gradle 8.7
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

// FIX: Added structural Flutter source link declaration to register your code assets correctly
flutter {
    source "../.."
}
