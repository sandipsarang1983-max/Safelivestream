plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.example.safe_live_stream_app"
    compileSdk 34

    defaultConfig {
        applicationId "com.example.safe_live_stream_app"
        minSdk 23
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    // Modern syntax for packaging native libraries
    packaging {
        jniLibs {
            pickFirsts += [
                'lib/arm64-v8a/libc++_shared.so',
                'lib/armeabi-v7a/libc++_shared.so',
                'lib/x86_64/libc++_shared.so'
            ]
        }
    }

    buildTypes {
        release {
            minifyEnabled false 
            shrinkResources false
        }
    }
}
