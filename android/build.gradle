buildscript {
    // FIX: Upgraded to 2.0.21 to fully resolve the BaseVariant class decorator crash with AGP 8.5+
    ext.kotlin_version = '2.0.21' 
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // KEEP: Maintained your 8.5.0 configuration
        classpath 'com.android.tools.build:gradle:8.5.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
        // Upgraded Google Services for current Firebase requirements
        classpath 'com.google.gms:google-services:4.4.2'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

// FIX: Modernized task registration syntax required by Gradle 8.7+ toolchains
tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
