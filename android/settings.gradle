pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def propertiesFile = new File(settingsDir, "local.properties")
        if (propertiesFile.exists()) {
            propertiesFile.withReader("UTF-8") { reader -> properties.load(reader) }
        }
        
        // 1. Try local.properties
        def sdkPath = properties.getProperty("flutter.sdk")
        
        // 2. Try Environment Variable (Reliable for CI/CD)
        if (sdkPath == null) {
            sdkPath = System.getenv("FLUTTER_ROOT")
        }
        
        // 3. Fallback to common Linux/CI paths if environment variable is missing
        if (sdkPath == null) {
            sdkPath = "/opt/hostedtoolcache/flutter/stable-3.24.5-x64/flutter"
        }
        
        if (sdkPath == null) {
            throw new GradleException("Flutter SDK not found. Ensure FLUTTER_ROOT is set in your environment.")
        }
        return sdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
}

include ":app"
